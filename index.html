<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>客户自助下单系统</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; background: #f5f7fb; margin: 0; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: #2c7da0; color: white; padding: 16px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .product-card { background: white; border-radius: 20px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; }
        .product-img { width: 100px; height: 100px; object-fit: cover; background: #f0f2f5; flex-shrink: 0; }
        .product-info { flex: 1; padding: 12px; }
        .product-name { font-weight: 600; margin-bottom: 4px; font-size: 0.95rem; }
        .product-spec { font-size: 0.75rem; color: #6c757d; margin-bottom: 6px; }
        .price-policy { font-size: 0.75rem; color: #d9534f; background: #fff3f0; padding: 4px 8px; border-radius: 12px; display: inline-block; margin: 6px 0; }
        .order-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; justify-content: space-between; }
        .quantity-control { display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 4px 12px; border-radius: 40px; }
        .quantity-control button { background: #e9ecef; border: none; width: 32px; height: 32px; border-radius: 40px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .quantity-control button:active { background: #ced4da; }
        .quantity-control span { min-width: 32px; text-align: center; font-weight: 500; }
        .item-total { font-size: 0.9rem; font-weight: 600; color: #2c7da0; }
        .customer-section { background: white; border-radius: 20px; padding: 16px; margin: 20px 0; }
        .customer-section input, .customer-section textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 16px; font-size: 1rem; }
        .total-bar { background: #1e6091; color: white; padding: 16px; border-radius: 40px; text-align: center; font-size: 1.5rem; font-weight: bold; margin: 20px 0; }
        .submit-btn { background: #2e7d32; color: white; border: none; width: 100%; padding: 16px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 10px 20px; border-radius: 30px; z-index: 999; font-size: 0.9rem; }
        .loading { background: #e9ecef; }
    </style>
    <!-- 引入商品数据文件，确保 products.js 与 index.html 放在同一目录 -->
    <script src="products.js"></script>
</head>
<body>
<div class="container">
    <div class="header"><h1>📋 在线下单系统</h1><p>填写盒数，自动计算优惠价</p></div>
    
    <div id="productsList"></div>
    
    <div class="customer-section">
        <h3>📇 客户信息</h3>
        <input type="text" id="storeName" placeholder="门店名称 *" required>
        <input type="text" id="contact" placeholder="联系人 *" required>
        <input type="tel" id="mobile" placeholder="手机号码 *" required>
    </div>
    
    <div class="total-bar">💰 总金额: ¥ <span id="totalAmount">0.00</span></div>
    <button class="submit-btn" id="submitBtn">✅ 提交订单</button>
</div>

<script>
    // ======================== 请在这里填写您的飞书配置信息 ========================
    const APP_TOKEN = "NhkWbKKRXadCljsK8occWzAIndg";          // 替换为飞书多维表格的 app_token（/base/ 后面的部分）
    const TABLE_ID = "tblZZDHSqoIX44bK";         // 替换为飞书多维表格的 table_id（?table= 后面的部分）
    const PERSONAL_BASE_TOKEN = "pt-TM_Un5dKxLzKikeClg3tVLf1K75fbf_daQQE3mmdAQAA1YsBPuDMQUk5kUGL";  // 替换为飞书个人授权码
    // =========================================================================

    // 辅助函数：解析政策，计算优惠金额
    function calculateDiscount(policyText, qty, unitPrice) {
        if (!policyText) return 0;
        const match = policyText.match(/买(\d+)盒立减(\d+)元/);
        if (!match) return 0;
        const threshold = parseInt(match[1]);
        const discountPer = parseInt(match[2]);
        let maxTimes = Infinity;
        const limitMatch = policyText.match(/上限(\d+)套/);
        if (limitMatch) maxTimes = parseInt(limitMatch[1]);
        let times = Math.floor(qty / threshold);
        if (times > maxTimes) times = maxTimes;
        return times * discountPer;
    }

    // 渲染商品列表
    const container = document.getElementById('productsList');
    let quantities = new Array(products.length).fill(0);

    function updateAllTotals() {
        let total = 0;
        for (let i = 0; i < products.length; i++) {
            const p = products[i];
            const qty = quantities[i];
            if (qty <= 0) continue;
            const discount = calculateDiscount(p.policy, qty, p.price);
            const itemTotal = p.price * qty - discount;
            total += itemTotal;
            const itemSpan = document.getElementById(`itemTotal_${i}`);
            if (itemSpan) itemSpan.innerText = itemTotal.toFixed(2);
        }
        document.getElementById('totalAmount').innerText = total.toFixed(2);
    }

    function changeQty(index, delta) {
        let newVal = quantities[index] + delta;
        if (newVal < 0) newVal = 0;
        quantities[index] = newVal;
        const qtySpan = document.getElementById(`qty_${index}`);
        if (qtySpan) qtySpan.innerText = newVal;
        updateAllTotals();
    }

    function renderProducts() {
        let html = '';
        products.forEach((p, idx) => {
            html += `
                <div class="product-card">
                    <img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/100?text=无图'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-spec">规格: 见包装 | 编码:${p.code}</div>
                        <div class="price-policy">💰 单价:¥${p.price} | ${p.policy || '无优惠'}</div>
                        <div class="order-row">
                            <div class="quantity-control">
                                <button onclick="changeQty(${idx}, -1)">-</button>
                                <span id="qty_${idx}">0</span>
                                <button onclick="changeQty(${idx}, 1)">+</button>
                            </div>
                            <div class="item-total">小计: ¥<span id="itemTotal_${idx}">0.00</span></div>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        updateAllTotals();
    }

    // 等待 products 加载完成再渲染
    if (typeof products !== 'undefined') {
        renderProducts();
    } else {
        container.innerHTML = '<div style="text-align:center;padding:40px;">商品数据加载失败，请检查 products.js 文件</div>';
    }

    // 提交订单
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    submitBtn.addEventListener('click', async () => {
    // ... 前面的代码用来收集订单信息，保持不变 ...
    const totalAmount = parseFloat(document.getElementById('totalAmount').innerText);
    const itemsText = items.map(item => 
        `${item.name} ×${item.quantity}盒 ￥${item.subtotal.toFixed(2)}`
    ).join("；");

    // 1. 将订单数据打包，准备发送给中间人
    const orderData = {
        storeName: storeName,
        contact: contact,
        mobile: mobile,
        totalAmount: totalAmount,
        itemsText: itemsText
    };

    // 2. 你的中间人服务地址，请替换成你刚刚部署的 Worker 地址
    const proxyUrl = "https://order-proxy.你的用户名.workers.dev";
    
    // 开始提交...
    submitBtn.disabled = true;
    submitBtn.innerText = '提交中...';
    try {
        // 3. 将数据 POST 给中间人
        const response = await fetch(proxyUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
        });
        const result = await response.json();
        // 4. 根据返回结果处理
        if (response.ok && !result.error) {
            showMessage('订单提交成功！感谢下单');
            // 清空表单...
        } else {
            showMessage('提交失败，请稍后重试', true);
        }
    } catch (err) {
        showMessage('网络错误，请检查网络后重试', true);
    } finally {
        // 恢复按钮状态...
    }
});
</script>
</body>
</html>
